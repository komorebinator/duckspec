name: DuckTools
description: CLI and MCP tools for loading and working with @DuckspecProject files.
extends: @DuckspecProject
uses:
  - ../Duckspec.yaml
goals:
  - Provide a lightweight project overview (root file + term list with descriptions) as the primary entry point
  - Load selected @Term definitions and their transitive dependencies by name, on demand
  - Search across term content by keyword to locate relevant terms without loading everything
  - Expose a consistent interface as CLI commands and as an optional MCP server
  - Support any model or runtime without model-specific integration
lists:
  - name: installation-methods
    items:
      - name: mcp
        description: register ducktools as an MCP server in the model's tool configuration; the server is started with `python3 -m ducktools serve <project_path>` from the ducktools/src directory
      - name: memory
        description: write `../AGENTS.md` into any persistent memory location available to the current model
      - name: claude
        description: register via mcp method first, then append a project entry to ~/.claude/CLAUDE.md noting the project path and that MCP tools (load_project, list_terms, load_terms, grep_terms) are available; create the file if it does not exist
guidelines:
  - Zero external dependencies; only Python stdlib is allowed for all features including the MCP server.
  - "@DuckspecProject files and @Term files are read as plain text; field extraction is done with regex, not a YAML parser."
  - The MCP server implements the JSON-RPC 2.0 wire protocol directly over stdio without using an MCP SDK.
recipes:
  - name: build
    description: Creates or updates source files in `src/` to match this @Software's specification
    instructions:
      - Invoke @Software#build()
  - name: run
    description: Runs a DuckTools command directly via Python without installation
    arguments:
      - name: command
        description: ducktools command to run; see cli#functions
      - name: project_path
        description: path to a @DuckspecProject .yaml file
    instructions:
      - Run `PYTHONPATH=<path to ducktools/src> python3 -m ducktools <command> <project_path>`
  - name: install
    description: Installs DuckTools so it is available in future sessions
    arguments:
      - name: method
        description: installation method; from installation-methods list; suggest mcp for the most seamless experience, memory for a model-agnostic approach
      - name: project_path
        description: path to the @DuckspecProject .yaml file to register
    instructions:
      - Ask the user for `method` if not provided; execute the chosen method from installation-methods
settings:
  terms_folder: ducktools
software:
  - @DuckToolsApp
