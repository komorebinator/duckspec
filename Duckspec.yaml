name: Duckspec
description: A spec-driven development framework for building complex projects with AI.
extends: @DuckspecProject
goals:
  - Standardize how requirements and @Term definitions are written across projects
  - Reduce the noise models introduce into the development process
  - Provide tools for describing and navigating project structure
  - Simplify repetitive development tasks
startup:
  - load
uses:
  - duckspec/DuckArch.yaml
  - duckspec/DuckVersion.yaml
  - ducktools/DuckTools.yaml
version: 0.8.1
repository: https://github.com/komorebinator/duckspec
settings:
  terms_folder: duckspec
  readme: README.md
workflow:
  type: @GitHubWorkflow
versioning:
  type: @SemVer

ai_instructions:
  - Never commit or push directly. When the user requests to send, submit, push, or publish changes with an imperative statement ("submit", "push", "send"), always invoke @DuckspecProject#submit() instead. When the user requests a release ("release", "release it"), always invoke @DuckspecProject#release(). Completing a task, permissive phrasing ("we can push", "it's fine to commit"), or confirmation that changes look good do NOT count as a request.
  - Never manually edit the `version` field in any @DuckspecProject file. Version changes must always go through the @DuckspecProject#release recipe, which handles validation and the correct bump calculation.
  - Never save information to external memory. Instead, suggest changes to the @DuckspecProject configuration or term files.
  - This is the core @Duckspec framework term set. When working with any @DuckspecProject that uses @Duckspec, load this project before any other work.
guidelines:
  - All documentation must be written in English.
  - Avoid abbreviations in @Term names; prefer full words (e.g. `Workflow` not `WF`, `Configuration` not `Cfg`, `Repository` not `Repo`).
  - Each `.yaml` file defines exactly one term following the @Term format.
  - "@Term names must be written in CamelCase with no spaces. The filename must match the @Term name (e.g. `UserInterface.yaml` for `name: UserInterface`)."
  - Use `@TermName` to reference terms wherever it makes sense.
  - Commit messages must be short and free of unnecessary detail.
  - All `Invoke @TermName#recipe_name()` references must resolve to an existing @Recipe defined on that @Term or inherited by it.
  - Sub-project @Term names must follow the pattern `Duck` + what it does (e.g. `DuckArch`, `DuckUI`); the word "spec" must not appear in sub-project names.
  - A new @Term belongs in the @Duckspec framework (global) if and only if all three hold â€” (1) the concept exists in standard CS/software engineering vocabulary without platform qualification and can be explained without mentioning any specific technology; (2) it would be useful in projects written in different languages and built on different stacks; (3) its name and definition are immediately understandable to a developer unfamiliar with this project's tech stack. If any of these fails, the term belongs in the project's own terms_folder.
  - A gap requiring a new @Term exists when the closest available @DesignPattern would lose significant architectural information â€” using it feels like a stretch that hides the real concept rather than describing it.
lists:
  - name: installation-methods
    items:
      - name: submodule
        description: run `git submodule add git@github.com:komorebinator/duckspec.git duckspec` in the target project root
      - name: copy
        description: ask the user for the path to the @Duckspec source (a local clone or download); copy the entire source directory into `duckspec/` in the target project root, overwriting any existing files
  - name: file-categories
    items:
      - name: code
        description: executable logic; maps to a @DesignPattern
      - name: config
        description: declarative configuration or data file (JSON, YAML, TOML, INI, .desktop, systemd unit, GSchema override, polkit rule, etc.); maps to @ConfigFile
      - name: asset
        description: images, icons, fonts, compiled binaries â€” record path and purpose only
      - name: meta
        description: .gitignore, LICENSE, lockfiles, README already in settings.readme â€” record existence, skip
  - name: code-patterns
    items:
      - name: ShellScript
        description: bash/sh/zsh scripts
      - name: Application
        description: program entry points
      - name: View
        description: windows, screens, dialogs, and modal overlays
      - name: Page
        description: named pages within a stack or tab view
      - name: UserInterface
        description: a module that owns and composes multiple @View instances
      - name: Extension
        description: plugins and add-ons
      - name: Pipeline
        description: CI/CD workflows triggered by events (push, cron, webhook)
      - name: ContainerImage
        description: Dockerfiles or Containerfiles
      - name: Singleton
        description: shared service or utility modules
      - name: Server
        description: daemons
      - name: Script
        description: other scripting files
recipes:
  - name: release
    description: Releases a new version of the @Duckspec framework
    arguments:
      - name: bump
        description: version component to bump; see @DuckspecProject#release
    instructions:
      - Check that the URL of the current git repository matches `repository`; if not, abort â€” releases must be run from the official @Duckspec repository
      - Invoke @DuckspecProject#release(bump=<bump>)
  - name: install
    description: Installs @Duckspec into a @Project
    arguments:
      - name: method
        description: installation method; from installation-methods list; default is submodule
    instructions:
      - Ask the user for `method` if not provided; suggest submodule as default; execute the chosen method from installation-methods
      - The framework is now installed at `duckspec/`; the main term file is at `duckspec/Duckspec.yaml`; from this point on read all files from local paths only â€” do not fetch anything from the internet
      - Scan the root directory for a description file (e.g. README.md); if it exists and already contains a link to an @DuckspecProject term file, stop â€” the @DuckspecProject is already set up; otherwise Invoke @Duckspec#create_project()
      - Ask the user which delivery workflow this project uses â€” present the available @DuckWorkflow subtypes (@GitHubWorkflow, @GerritWorkflow, @GitWorkflow) with a one-line description of each; add the chosen subtype to the project's `software:` list
      - Invoke @DuckTools#install(project_path=<path to the @DuckspecProject file created in the previous step>)
  - name: update
    description: Updates @Duckspec to the latest version in a @Project where it is already installed
    instructions:
      - Check whether `duckspec/` is a git submodule by inspecting `.gitmodules`; if found, use the submodule method from installation-methods; otherwise use the copy method
      - Execute the chosen method
      - Invoke @DuckspecProject#validate()
  - name: create_project
    description: Creates a minimal @DuckspecProject term file, then optionally imports term definitions from the project source
    instructions:
      - Invoke @DuckTools#run(command=load --all, project_path=<path to this file>) and read the full output into context
      - Ask the user in which folder the @DuckspecProject term file should be stored; it must not be inside the `duckspec/` folder â€” that is reserved for the framework
      - Infer the project name and description from context (repository name, README, etc.); ask the user to confirm or correct them
      - Set `settings.terms_folder` to a subfolder named after the project, located next to the @DuckspecProject term file (e.g. if the file is `myapp/MyApp.yaml`, set `settings.terms_folder` to `MyApp/`)
      - If a README or other description file exists, set `settings.readme` to its path (relative to the @DuckspecProject term file)
      - Create the @DuckspecProject term file named `<ProjectName>.yaml` (matching the `name:` field) in the folder chosen in the first step, with only the fields that are known â€” name, description, settings, and `uses` set to the relative path from the @DuckspecProject file to `duckspec/Duckspec.yaml`; leave all other slots empty
      - Create the terms folder on disk at the path set in `settings.terms_folder`
      - Invoke @DuckspecProject#update_readme()
      - Invoke @DuckTools#run(command=load --all, project_path=<path to the created @DuckspecProject file>) and read the full output into context
      - Ask the user whether to assess coverage of the project source; if yes, Invoke @DuckspecProject#assess_coverage()
