name: Aikata
description: A spec-driven development framework for building complex projects with AI.
extends: @AikataProject
goals:
  - Standardize how requirements and @Term definitions are written across projects
  - Reduce the noise models introduce into the development process
  - Provide tools for describing and navigating project structure
  - Simplify repetitive development tasks
settings:
  terms_folder: .
  readme: ../README.md
  readme_footer: "This [project](aikata/Aikata.yaml) uses the [aikata framework](aikata/Aikata.yaml), see [@Term](aikata/Term.yaml)."
guidelines:
  - All documentation must be written in English.
  - Each `.yaml` file defines exactly one term following the @Term format.
  - @Term names must be written in CamelCase with no spaces. The filename must match the @Term name (e.g. `UserInterface.yaml` for `name: UserInterface`).
  - Use `@TermName` to reference terms wherever it makes sense.
  - Commit messages must be short and free of unnecessary detail.
recipes:
  - name: install
    description: Installs @Aikata into a @Project
    arguments:
      - name: method
        description: installation method; "submodule" (default) or "copy"
    instructions:
      - Ask the user which installation method they prefer â€” git submodule (default) or copy â€” and set `method` accordingly
      - If method is "submodule", run `git submodule add git@github.com:komorebinator/aikata.git aikata` in the target project root
      - If method is "copy", copy the aikata/ folder into the target project root
      - Scan the root directory for a description file (e.g. README.md); if it exists and already contains a link to an @AikataProject term file, stop â€” the @AikataProject is already set up; otherwise Invoke @Aikata#create_project()
  - name: create_project
    description: Creates a minimal @AikataProject term file, then optionally imports term definitions from the project source
    instructions:
      - Ask the user in which folder the @AikataProject term file should be stored
      - Infer the project name and description from context (repository name, README, etc.); ask the user to confirm or correct them
      - Set `settings.terms_folder` to a subfolder named after the project, located next to the @AikataProject term file (e.g. if the file is `myapp/MyApp.yaml`, set `settings.terms_folder` to `MyApp/`)
      - If a README or other description file exists, set `settings.readme` to its path (relative to the @AikataProject term file)
      - Set `settings.readme_footer` to the default template from @AikataProjectSettings with `<path to the @AikataProject term file>` replaced by the actual relative path to the term file being created
      - Create the @AikataProject term file with only the fields that are known â€” name, description, and settings; leave all optional slots empty
      - Create the terms folder on disk at the path set in `settings.terms_folder`
      - Invoke @AikataProject#update_readme()
      - Ask the user if they want to import term definitions from the project source; if yes, Invoke @Aikata#import_project(project=<path to the created @AikataProject term file>)
  - name: import_project
    description: Scans a project source folder and generates @Term definitions from it
    arguments:
      - name: project
        description: path to the @AikataProject term file
      - name: src
        description: path to the folder to scan
    instructions:
      - Ask the user for `project` if not provided; ask the user for `src` if not provided
      - Invoke @AikataProject#load_terms()
      - Scan all files in `src` recursively; read enough of each file to identify domain concepts, data structures, and key abstractions
      - Determine which concepts are meaningful to document as @Term definitions; skip implementation details that do not belong in domain vocabulary
      - For each identified concept, generate a @Term file in `settings.terms_folder`; reuse or extend existing @Term definitions where appropriate
      - Invoke @AikataProject#validate()
