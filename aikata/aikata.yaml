name: Aikata
description: A spec-driven development framework for building complex projects with AI.
extends: @Project
goals:
  - Standardize how requirements and terms are written across projects
  - Reduce the noise models introduce into the development process
  - Provide tools for describing and navigating project structure
  - Simplify repetitive development tasks
guidelines:
  - All documentation must be written in English.
  - Each `.yaml` file defines exactly one term following the @Term format.
  - Use `@TermName` to reference terms wherever it makes sense.
  - Commit messages must be short and free of unnecessary detail.
recipes:
  - name: install
    description: Installs @Aikata into a @Project
    arguments:
      - name: method
        description: installation method; "submodule" (default) or "copy"
    instructions:
      - Ask the user which installation method they prefer — git submodule (default) or copy — and set `method` accordingly
      - If method is "submodule", run `git submodule add git@github.com:komorebinator/aikata.git aikata` in the target project root
      - If method is "copy", copy the aikata/ folder into the target project root
      - Scan the root directory for a description file (e.g. README.md); if it exists and already contains a link to an @Project term file, stop — the @Project is already set up; otherwise Invoke @Aikata#create_project(), then Invoke @Project#update_readme()
  - name: create_project
    description: Creates an @Project term file
    instructions:
      - Ask the user in which folder the @Project term file should be stored
      - Ask the user whether to analyze existing project files to generate a richer @Project definition; if yes, explore the repository structure and use findings to inform the generated content
      - Generate an @Project term file in the specified folder
