name: Function
description: A description of an algorithm that can be directly converted to code.
properties:
  - name: name
    required: true
    description: @Function identifier, no spaces (code-style)
  - name: description
    required: true
    description: what the @Function does and how; include algorithm logic, edge cases, and expected behavior
  - name: arguments
    required: false
    description: list of arguments the @Function accepts; each argument has a name and a description
  - name: signal
    required: false
    description: signal this function connects to; use name#signal_name for a local component or @TermName#signal_name for an external one; if set, the function is automatically called when the signal fires
