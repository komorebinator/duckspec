name: Project
description: Base term for project definitions. Extend this term to describe a specific project — an application, service, or any other endeavor that uses aikata for documentation.
guidelines:
  - Main description file (e.g. README.md, index.md, or OVERVIEW.md) must contain a footer with three links — to the @Project term file, the @Aikata framework (`aikata/aikata.yaml`), and the @Term definition (`aikata/term.yaml`). Use `settings.readme_footer` as the footer text.
contains:
  - name: goals
    description: list of @Goal the @Project pursues
  - name: guidelines
    description: list of @Guideline the @Project defines
  - name: settings
    description: @Project configuration; see @Settings
  - name: applications
    description: list of @Application the @Project contains
recipes:
  - name: create_readme
    description: Creates the root description file for the @Project and registers it in @Settings
    instructions:
      - Read the @Project term file to get the @Project's name, description, and goals
      - Ask the user where to create the file (default: README.md)
      - Create the file with the @Project name as the H1 heading, description as the opening line, and goals as a bullet list under a "Goals" heading
      - Save the file path to `settings.readme`
  - name: update_readme
    description: Updates the root description file to reflect the current @Project definition
    instructions:
      - Read the @Project term file to get the @Project's name, description, and goals
      - Read `settings.readme` from @Settings; if it is not set, ask the user whether to set an existing path or Invoke @Project#create_readme()
      - If the file at `settings.readme` does not exist, Invoke @Project#create_readme()
      - If the file exists, apply only the necessary edits to bring its name, description, and goals in sync with the @Project definition; leave all other content untouched

