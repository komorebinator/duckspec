name: Project
description: Base term for project definitions. Extend this term to describe a specific project — an application, service, or any other endeavor that uses aikata for documentation.
contains:
  - name: goals
    description: list of @Goal the project pursues
  - name: guidelines
    description: list of @Guideline the project defines
  - name: settings
    description: project configuration; see @Settings
  - name: applications
    description: list of @Application the project contains
recipes:
  - name: update_readme
    description: Updates the root README.md to reflect the current project definition
    instructions:
      - Read the term file that extends @Project to get the project's name, description, and goals
      - If README.md does not exist, create it with the project name as the H1 heading, description as the opening line, and goals as a bullet list under a "Goals" heading
      - If README.md exists, apply only the necessary edits to bring its name, description, and goals in sync with the project definition; leave all other content untouched
      - If README.md does not already contain a link to `aikata/aikata.yaml`, append: "This [project](<path-to-project-term-file>) uses the [aikata framework](aikata/aikata.yaml), see [@Term](aikata/term.yaml)."
