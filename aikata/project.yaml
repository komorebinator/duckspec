name: Project
description: Base term for project definitions. Extend this term to describe a specific project — an application, service, or any other endeavor that uses aikata for documentation.
contains:
  - name: goals
    description: list of @Goal the project pursues
  - name: guidelines
    description: list of @Guideline the project defines
  - name: settings
    description: project configuration; see @Settings
  - name: applications
    description: list of @Application the project contains
recipes:
  - name: update_readme
    description: Updates the root README.md to reflect the current project definition
    instructions:
      - Read the term file that extends @Project to get the project's name, description, and goals
      - Read the existing README.md if it exists
      - Write README.md with the project name as the H1 heading, description as the opening line, and goals as a bullet list under a "Goals" heading
      - Append to the end of README.md: "This project uses the aikata framework. See [aikata/aikata.yaml](aikata/aikata.yaml)."
