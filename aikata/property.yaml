name: Property
description: A named field on a @Term that holds a value.
properties:
  - name: name
    required: true
    description: property identifier, no spaces (code-style)
  - name: description
    required: false
    description: what the property represents
  - name: type
    required: false
    description: free-form description of the value type
  - name: default
    required: false
    description: default value if not explicitly set
  - name: required
    required: false
    description: whether the property must be set; defaults to false
