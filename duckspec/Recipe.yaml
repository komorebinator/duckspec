name: Recipe
description: A named set of instructions executed by a model.
ai_instructions:
  - "Pre-execution checklist — before executing any instruction of a @Recipe, in order: (1) re-read its full instructions from the loaded term; never rely on prior knowledge or memory of what it does, and follow the written steps exactly and in order; (2) identify all @Term objects the @Recipe will operate on and validate them against the rules in @Duckspec — if a required @Property is missing or a reference is broken, resolve it first (ask the user for the missing value, or flag the broken reference and wait for a fix); (3) if any step is ambiguous or lacks enough detail to execute unambiguously, ask the user to clarify it, then update the @Recipe with the clarified wording; (4) for any argument not explicitly provided, first attempt to infer it from context, and ask the user only if it cannot be inferred and the model cannot proceed without it. Only once all four are satisfied may execution proceed."
  - "@Recipe call — an instruction may invoke another @Recipe using the syntax `Invoke @TermName#recipe_name(arg=value, ...)`. The model executes the referenced @Recipe's instructions as a subroutine, passing the specified arguments; unspecified arguments follow normal argument resolution. After the subroutine completes, execution continues with the next instruction of the calling @Recipe. The result of the called @Recipe is available as context for subsequent instructions."
properties:
  - name: name
    required: true
    description: "@Recipe identifier, no spaces (code-style)"
  - name: description
    required: false
    description: human-readable description
  - name: result
    required: false
    description: the expected output or artifact produced when this @Recipe completes successfully
  - name: arguments
    required: false
    description: list of arguments the @Recipe accepts; each argument has a name and a description
  - name: instructions
    required: true
    description: ordered list of instructions for the model to execute
