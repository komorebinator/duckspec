name: Recipe
description: A named set of instructions executed by a model.
ai_instructions:
  - Argument resolution — if an argument value is not explicitly provided, the model must first attempt to infer it from context. If the value cannot be inferred and the model cannot proceed without it, the model must ask the user.
  - Pre-execution validation — before executing any instruction, the model must identify all @Term objects the @Recipe will operate on and validate them against the rules in @Duckspec. If a required @Property is missing or a reference is broken, the model must resolve the issue first: ask the user for the missing value, or flag the broken reference and wait for a fix. Only once all objects are valid may the model proceed with the @Recipe's instructions.
  - Pre-execution clarification — before executing any instruction, if any step is ambiguous or lacks enough detail to execute unambiguously, the model must ask the user to clarify it, then update the @Recipe with the clarified wording before proceeding.
  - "@Recipe call — an instruction may invoke another @Recipe using the syntax `Invoke @TermName#recipe_name(arg=value, ...)`. The model executes the referenced @Recipe's instructions as a subroutine, passing the specified arguments; unspecified arguments follow normal argument resolution. After the subroutine completes, execution continues with the next instruction of the calling @Recipe. The result of the called @Recipe is available as context for subsequent instructions."
properties:
  - name: name
    required: true
    description: "@Recipe identifier, no spaces (code-style)"
  - name: description
    required: false
    description: human-readable description
  - name: arguments
    required: false
    description: list of arguments the @Recipe accepts; each argument has a name and a description
  - name: variants
    required: false
    description: list of named alternatives for how the @Recipe can execute; each variant has a name and a description of what it does; referenced by name in arguments and instructions
  - name: instructions
    required: true
    description: ordered list of instructions for the model to execute
