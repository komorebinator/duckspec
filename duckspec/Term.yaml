name: Term
description: A named element of the @Project's domain vocabulary.
ai_instructions:
  - When a @Term declares `extends`, resolve the parent @Term first (recursively). The child inherits all parent @Property, @Recipe, and contains slots. Any child member with the same name as a parent member fully replaces it. Members not redefined in the child are inherited as-is.
  - "Path references: any named element within a @Term can be addressed by a `#`-separated path through its namespace (e.g. `cli#load` to reach the element named `load` inside `cli`). The path does not have to follow strict parent-child nesting — it is a sequence of names that narrows the namespace at each step. To reference an element in another @Term, prefix the path with `@TermName` (e.g. `@DuckTools#cli#load`)."
properties:
  - name: name
    required: true
    description: CamelCase identifier; must match the filename (e.g. `UserInterface` in `UserInterface.yaml`)
  - name: description
    required: true
    description: human-readable explanation of what this @Term represents
contains:
  - name: extends
    description: parent @Term to inherit from
  - name: contains
    description: list of named slots this @Term introduces for its extenders
  - name: properties
    description: list of @Property the @Term holds
  - name: recipes
    description: list of @Recipe the @Term exposes
  - name: guidelines
    description: list of @Guideline the @Term defines for content and artifact quality
  - name: ai_instructions
    description: list of behavioral directives for the model when working with this @Term
