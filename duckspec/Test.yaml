name: Test
description: A named test case that verifies a @Software component behaves as expected.
properties:
  - name: name
    required: true
    description: test identifier, no spaces (code-style)
  - name: description
    description: what this test verifies
  - name: command
    required: true
    description: command to run following the software's `target_platform` conventions
  - name: expect
    required: true
    description: expected output or behavior that indicates the test passed
