name: DuckspecProject
description: A @Project managed with @Duckspec.
extends: @Project
guidelines:
  - All file paths in @DuckspecProject files are relative to the file in which they appear.
  - All entries in `uses` are loaded unconditionally when this project is loaded.
  - A @DuckspecProject may reference another @DuckspecProject in a different directory via `uses` with a relative path (e.g. `../OtherProject.yaml`); circular references are safe — the resolver deduplicates by resolved path.
  - Place sub-project files inside the parent project's directory, not alongside it (e.g. `Parent/Child.yaml`, not `Child.yaml` next to `Parent.yaml`).
  - A @DuckspecProject may reference an external @DuckspecProject by its `repository` URL (e.g. `https://github.com/user/repo`); the resolver looks up the URL in `~/.duckspec/workspace.yaml` to find the local path. If no workspace entry exists, the entry is skipped with a warning.
ai_instructions:
  - When first opening an @DuckspecProject, invoke all recipes listed in `startup` before doing anything else.
  - For any @Term not covered after loading, read its file individually on demand. If only one named element is needed (a single recipe, function, or component) rather than the whole term, prefer @DuckToolsApp#resolver#resolve_path(ref=<TermName>#<path>) over loading the entire term — it resolves directly to the target element without pulling in transitive dependencies that would otherwise be discarded unread.
properties:
  - name: version
    description: current version string; format determined by the project's `versioning` strategy
  - name: repository
    description: URL of the project's source repository
contains:
  - name: settings
    description: @DuckspecProject configuration; see @DuckspecProjectSettings
  - name: startup
    description: list of @Recipe names to invoke automatically before any other work when first opening the @DuckspecProject
  - name: uses
    description: list of paths or repository URLs to other @DuckspecProject files this project uses; entries may be relative paths (e.g. `../OtherProject.yaml`) or repository URLs (e.g. `https://github.com/user/repo`) resolved via `~/.duckspec/workspace.yaml`; all are loaded unconditionally when this project is loaded
  - name: workflow
    description: delivery workflow for this project; `type:` references a @DuckWorkflow subtype (e.g. `@GitHubWorkflow`); all other fields are property overrides — omit any that should be inferred from context
  - name: versioning
    description: versioning strategy for this project; `type:` references a @VersioningStrategy subtype (e.g. `@SemVer`); all other fields are property overrides
recipes:
  - name: load
    description: Loads an overview of this @DuckspecProject into context — root file content, term list with descriptions, available recipes, and all active rules (guidelines and ai_instructions); then loads specific terms on demand as work requires
    instructions:
      - Invoke @DuckToolsApp#resolver#load_project(project_path=<path to this @DuckspecProject file>)
      - Load additional terms on demand via @DuckToolsApp#resolver#load_terms(project_path=<path>, term_names=<names>)
  - name: check_guidelines
    description: Checks a single term file against all guidelines and ai_instructions applicable to it, derived from its full inheritance chain
    arguments:
      - name: file_path
        description: path to the .yaml term file to check
    instructions:
      - Identify the term defined in file_path from the already-loaded term data; if not found in context, read the file directly
      - Build the full inheritance chain by following `extends` recursively through loaded terms until reaching a term with no `extends`
      - Collect applicable rules from two sources: (1) guidelines and ai_instructions from the term itself and every ancestor in the inheritance chain; (2) all rules from the Rules table already loaded into context via @DuckspecProject#load — these are project-wide rules that apply to every term regardless of inheritance; annotate each rule with its source @Term and deduplicate
      - For each collected rule: evaluate whether the term's content complies; record each violation with the rule text, source @Term, and a description of the non-compliance
      - Output a report: file path, term name, inheritance chain, and list of violations (or "no violations" if compliant)
  - name: validate
    description: Validates all loaded @Term files against the @DuckspecProject guidelines and runs software tests
    instructions:
      - Invoke @DuckspecProject#load()
      - "For each term file in the loaded output: check that all required @Property fields are present; check that all @TermName references exist in the term map, excluding placeholder examples that illustrate the `#`-path reference syntax itself (e.g. generic names like `@TermName` or `@MyTerm` used in guideline/recipe documentation about the syntax, not as an actual reference to a specific term); check that all `Invoke @TermName#recipe_name()` references resolve to an existing @Recipe; record any structural violations"
      - For each term file in the loaded output: Invoke @DuckspecProject#check_guidelines(file_path=<path>)
      - "For each @Software reachable transitively via `uses:` and `software:` from this project — including sub-projects referenced by relative path or by `repository` URL alike, regardless of which repository they live in: Invoke @Software#test(); a @Software with no `tests:` of its own has nothing to run and is reported as such, so no separate exclusion list is needed"
      - Report a summary of all violations and test results; fix where possible, ask the user where the correct resolution is ambiguous
  - name: create_term
    description: Creates a new @Term file in the @DuckspecProject's terms folder
    arguments:
      - name: name
        description: CamelCase name for the new @Term
    instructions:
      - Ask the user for `name` if not provided
      - Ask the user which parent @Term it extends; read that @Term to understand what properties and slots are available
      - Ask the user which of the inherited characteristics are relevant and what values or descriptions to set
      - Create the file `<settings.terms_folder>/<name>.yaml` with the provided content
      - Invoke @DuckspecProject#validate()
  - name: create_readme
    description: Creates the root description file for the @DuckspecProject and registers it in @DuckspecProjectSettings
    instructions:
      - Read the @DuckspecProject term file to get the @DuckspecProject's name, description, and goals
      - Ask the user where to create the file (default: README.md)
      - Create the file with the @DuckspecProject name as the H1 heading, description as the opening line, and goals as a bullet list under a "Goals" heading
      - Save the file path to `settings.readme`
  - name: term_map
    description: Displays the current term map as a markdown table with descriptions
    instructions:
      - Invoke @DuckToolsApp#resolver#list_terms(project_path=<project_path>) and output the result
  - name: rules
    description: Displays all active rules (guidelines and ai_instructions) collected from loaded @Term files, including inherited ones. Useful when rules need to be reviewed in isolation; rules are also included in the @DuckspecProject#load output automatically.
    instructions:
      - For each loaded term, collect its guidelines and ai_instructions; include inherited ones, marking the source @Term for each entry
      - Output a markdown table with columns: Source (@TermName link style), Type (Guideline or AI Instruction), Rule (the text)
      - One row per entry, grouped by source term, guidelines before ai_instructions within each group
  - name: update_agents
    description: Creates or updates AGENTS.md with the command to load this @DuckspecProject
    instructions:
      - Write or overwrite `AGENTS.md` next to this @DuckspecProject file instructing the reader to invoke @DuckToolsApp#resolver#load_project(project_path=<path>) via whichever interface is available (MCP tool or CLI); keep it as brief as possible
  - name: update_readme
    description: Updates the root description file to reflect the current @DuckspecProject definition
    instructions:
      - Read the @DuckspecProject term file to get the @DuckspecProject's name, description, and goals
      - Read `settings.readme` from @DuckspecProjectSettings; if it is not set, ask the user whether to set an existing path or Invoke @DuckspecProject#create_readme()
      - If the file at `settings.readme` does not exist, Invoke @DuckspecProject#create_readme()
      - If the file exists, apply only the necessary edits to bring its name, description, and goals in sync with the @DuckspecProject definition; leave all other content untouched
  - name: assess_coverage
    description: Analyzes source files and generates or updates @Term definitions detailed enough that running `build` on the result would recreate the project faithfully. Idempotent — can be run multiple times to refine or update existing terms.
    instructions:
      - Invoke @DuckToolsApp#resolver#list_terms(project_path=<path>, all=true) to get all term names; then invoke @DuckToolsApp#resolver#load_terms(project_path=<path>, term_names=<all names from previous step>) to load their content; if the output was truncated and saved to a file, read that file completely before proceeding
      - Read `src` from settings.src; if not set, default to `..` relative to this @DuckspecProject file's location; confirm the resolved path with the user before proceeding
      - Scan all files in `src` recursively; skip subfolders that contain a @DuckspecProject installation (Duckspec.yaml present); assign each file to exactly one category from file-categories
      - Classify each code file using the most specific pattern from code-patterns; use the same priority order as the list; note every file where the closest available pattern is a stretch — where using it would hide the real concept rather than describe it
      - For each noted gap, draft a proposed @Term (name, description, extends, properties, contains) and classify its scope using the framework guidelines: global (@Duckspec framework) if the concept is standard CS vocabulary, stack-agnostic, and universally understandable; project-local otherwise; then present all proposed terms as a multi-select checklist — each item shows the term name, a one-line description, and the proposed scope (global → PR to duckspec / local → project terms_folder) — and ask the user to select which terms to create; skip unselected terms entirely; for selected global terms: write the term files and create a pull request to the duckspec repository via `gh pr create --repo komorebinator/duckspec` with a description explaining what each term represents and why it belongs in the framework; for selected local terms: write the term files to the appropriate sub-project `settings.terms_folder`
      - Identify external platforms or applications that project files extend (e.g. GNOME Shell, systemd, a browser); define each as a named @Application term so that @Extension terms can reference it via `target:`
      - Group files into sub-projects by domain — all files that extend or configure the same external platform form one @DuckspecProject sub-project (e.g. all systemd units → Systemd sub-project, all GNOME extensions and config → Gnome sub-project); self-contained runnable applications with their own entry point also form sub-projects; everything else embeds inline; the root project connects sub-projects only via `uses:` — no `software:` list at the root level
      - Ensure no naming conflicts: the sub-project file name (e.g. Systemd.yaml with `name: Systemd`) must not match any term name inside its `terms_folder`; use more specific names for inner terms (e.g. `SystemdManager.yaml`, `RuntimeScripts.yaml`)
      - For each @Application identified, collect all code files that are used exclusively by that application (not imported or referenced by files belonging to any other application). Propose those files as inline `components:` of the application term rather than as separate top-level terms. A module warrants its own named term only if it is shared across two or more distinct applications; in that case define it as a @Singleton or other appropriate @DesignPattern term and reference it via `@TermName#component-name` path syntax from the application's component descriptions.
      - Produce a proposed term tree — a structured outline listing every planned @Term file, its type, the source files it covers, and which sub-project it belongs to — and present it to the user for approval or adjustment before writing any files
      - For each @View term — (1) document the visual structure as components enumerating every @UserInterfaceElement (@Button, @Toggle, @Input, @Label, @ProgressBar, @Spinner, @Page, etc.) with its label, role, and enabled/visible conditions; (2) document page or state transitions; (3) add @Function entries only for event handlers and non-trivial logic, not for widget construction
      - For each @ShellScript or @Script term write a single run function whose description covers every major step, conditional branch, environment variable dependency, external command invoked, and expected side effect on the system
      - For each @Pipeline term document its triggers, jobs, matrix variants, and outputs
      - For each @ContainerImage term document its stages, build args, and what each stage installs or configures
      - For each config file create a named @ConfigFile term (or a named component of the most closely related @Software) with a configure function describing the file's purpose and the meaning of its key fields
      - For each @Function in code components write a description covering the algorithm, data flow, edge cases, and expected output in enough detail that a developer could reimplement the function without reading the source
      - For each component with non-trivial state, declare it as `fields:` (a list of @Field) rather than describing it in prose: instance fields (`this.x` / class field declarations) nested on the owning component, module-level constants nested at the top level of the @Software, and state the component attaches to objects it does not own (e.g. a property set on a window, DOM node, or other external object), named with that object's local identifier as a prefix (e.g. `win._bwmState`). Do not add a `scope` property — scope follows from where the @Field is nested and its name prefix (see @Field). A field's `type` should capture its real shape (union of literal states, nullable, array/map element types, or an inline object shape for plain data records). If a field is just the instance-variable binding for a widget that already has its own named @UserInterfaceElement entry in `components:`, nest the @Field on that child component instead of listing it again on the parent — never describe the same widget's identity in two places in the tree. Do not duplicate the same state as both a `fields:` entry and a narrative description elsewhere — the prose `description` should cover behavior and algorithms; `fields:` is the single source of truth for state shape.
      - Write all term files to the appropriate terms folders; for existing term files update them in place — preserve any manually written content not contradicted by the source
      - Verify coverage — for every file in code, config, and asset categories confirm it has a dedicated named entry; a file is NOT covered if it appears only inside another component's description text; list all remaining gaps
      - Output a coverage report as a markdown table in the conversation: total files scanned, covered files (path → term name), skipped files (path → reason), and any remaining gaps
      - Review type precision: for every existing @SoftwareComponent in the covered terms, check whether a more specific @DesignPattern is now available in the term map that better describes the component than its current type; propose re-typing and ask the user to confirm before changing
      - Verify fidelity: for at least one non-trivial component, actually invoke @Software#build() against an empty/scratch location (not the real `src`) from the spec alone, then diff the result against the real source — do not just mentally simulate it; reconstructing each component's `fields:` as real field/property declarations. Treat naming/formatting/control-flow-shape differences as expected and not worth fixing. Treat these as real gaps and fix the spec when found: (1) a defensive guard or precondition check on an external API call (null/undefined checks, type checks on returned data, range checks) that the description's algorithm steps don't mention — these are exactly the details prose summaries tend to drop; (2) a pervasive cross-cutting convention (logging, a particular event-ordering rule, a naming pattern) that the source applies broadly but no single @Function description states — these belong in `guidelines:`, not in every function individually. If the result differs from the source in any other meaningful way (missing state, wrong shape, wrong algorithm step), add the missing detail.
  - name: learn
    description: Captures durable knowledge from the current session into spec files — updates existing descriptions, properties, or function documentation when non-obvious facts were confirmed. Does not create new terms; use assess_coverage for that.
    instructions:
      - Review the current session for confirmed, non-obvious, durable facts — behaviors verified against the source, gotchas and their fixes, mechanisms worked out, clarifications to existing descriptions; skip anything one-off, already documented, or derivable from a quick read of the code
      - For each qualifying fact: identify the exact @Term and field to update; read that term file; apply only the targeted edit — change nothing else
      - Invoke @DuckspecProject#validate() to verify no violations were introduced
  - name: verify_source
    description: Finds contradictions between the spec and the source code — checks that src paths exist, that named functions and components are present in the referenced files, and that descriptions do not contradict the actual implementation
    instructions:
      - Invoke @DuckspecProject#load()
      - For every `src:` field in every loaded term and component — check that the file or directory exists at the specified path relative to the project root; record any missing paths
      - For every @Function entry with a named function — open the referenced source file and check that a definition matching the function name exists; record any that are absent or clearly renamed
      - For the most complex @Function descriptions — read the corresponding source and check for direct contradictions (wrong return type, wrong conditionals, steps that don't exist); record contradictions but do not flag style differences or minor omissions
      - Report all findings grouped by term file: missing paths, absent functions, and description contradictions; suggest the corrective edit for each; fix on user confirmation
  - name: submit
    description: Validates the project and runs the author-side delivery step of the configured @DuckWorkflow; other workflow recipes (update, review, merge) can be invoked directly on the workflow type
    instructions:
      - Invoke @DuckspecProject#validate()
      - Read `workflow` from this project; if not set, ask the user to configure it and stop
      - Invoke @DuckWorkflow#submit() using the workflow type and any configured property overrides
  - name: release
    description: Calculates the next version via the configured @VersioningStrategy, submits all changes, and publishes a release via the configured @DuckWorkflow
    arguments:
      - name: bump
        description: hint passed to the versioning strategy (e.g. patch/minor/major for @SemVer); interpretation depends on the configured strategy
    instructions:
      - Read `versioning` from this project; if not set, ask the user to configure it and stop
      - Invoke @VersioningStrategy#next_version(bump=<bump>) to obtain the new version string
      - Update the `version` field in this @DuckspecProject file to the new version string
      - Invoke @DuckspecProject#submit()
      - Read `workflow` from this project; if not set, ask the user to configure it and stop
      - Invoke @DuckWorkflow#release(version=<new_version>)
