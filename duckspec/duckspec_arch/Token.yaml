name: Token
description: A dynamically issued credential with a defined lifecycle. Issued on authentication and presented on subsequent requests to prove identity or authorization.
extends: @DesignPattern
properties:
  - name: type
    description: token type (e.g. JWT, OAuth access token, refresh token, session cookie, API key)
  - name: lifetime
    description: how long the token remains valid before expiring; omit if it does not expire
  - name: storage
    description: where the token is stored on the client side (e.g. HTTP-only cookie, Authorization header, memory, localStorage)
