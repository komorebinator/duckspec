name: Patch
description: A diff file applied to a component's source at build time to modify its default settings or behavior. Typically produced by diff -u.
extends: @ConfigFile
properties:
  - name: target
    description: the @Term or component this patch applies to; use @TermName or component#element path syntax (e.g. @MyTerm or #my-component); implicit when @Patch is nested inside a component's patches block
