name: SoftwareComponent
description: A named instance of a @DesignPattern within a @Software.
properties:
  - name: name
    required: true
    description: local path identifier for this component; use `component#element` path syntax (see @Term) to reference its functions, signals, or nested components
  - name: type
    required: true
    description: the @DesignPattern this component instantiates (e.g. @Singleton)
  - name: description
    required: true
    description: top-level overview of what this component does or is; sufficient on its own for declarative components (e.g. @ConfigFile, @Patch); other slots (functions, signals, components) add detail for components with non-trivial behavior
contains:
  - name: functions
    description: list of @Function this component exposes or handles
  - name: signals
    description: list of @Signal this component emits
  - name: components
    description: list of nested @SoftwareComponent instances owned by this component
