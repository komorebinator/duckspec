name: Secret
description: A sensitive configuration value (API key, password, token, passphrase) that must not be exposed in source code or logs.
extends: @DesignPattern
properties:
  - name: storage
    description: where and how this secret is stored and injected at runtime (e.g. environment variable, secret manager, vault, CI/CD secret, encrypted file)
  - name: used_by
    description: which components or services consume this secret
