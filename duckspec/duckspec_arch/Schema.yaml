name: Schema
description: A formal definition of a data structure — its fields, types, constraints, and relationships. May be expressed as JSON Schema, TypeScript interface, protobuf message, database table, or similar.
extends: @DesignPattern
properties:
  - name: format
    description: schema language or notation (e.g. JSON Schema, TypeScript, protobuf, SQL DDL, Zod)
  - name: represents
    description: what kind of data this schema describes (e.g. API request body, database row, configuration object, event payload)
