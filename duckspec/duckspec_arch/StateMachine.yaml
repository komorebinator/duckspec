name: StateMachine
description: A component that manages a finite set of named states and the transitions between them, triggered by events or conditions.
extends: @DesignPattern
contains:
  - name: states
    description: list of named states with a description of what each state means
  - name: transitions
    description: list of transitions; each transition has a source state, a trigger event or condition, a target state, and an optional action executed on transition
